x-supabase-config: &supabase-config
  POSTGRES_PASSWORD: "root_password"
  POSTGRES_DB: postgres
  JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
  PGRST_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
  SITE_URL: "http://localhost:15300"
  API_EXTERNAL_URL: "http://localhost:15432"
  ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNjAwMDAwMDAwLCJleHAiOjI2MDAwMDAwMDB9.2ao3DxAoc3nVdaTeKzjBwxcKqVBVDdqFbSxWEgJln3c"
  SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE2MDAwMDAwMDAsImV4cCI6MjYwMDAwMDAwMH0.NGlfajTL38AtNO2eYSmTqocSyK6BClPz7U---KF4gS4"
  SERVICE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE2MDAwMDAwMDAsImV4cCI6MjYwMDAwMDAwMH0.NGlfajTL38AtNO2eYSmTqocSyK6BClPz7U---KF4gS4"

services:
  db-patch:
    image: postgres:15-alpine
    container_name: supabase_db_patch
    restart: "no"
    environment:
      PGPASSWORD: "root_password"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c '
      until pg_isready -h db -p 5432 -U postgres; do sleep 2; done;
      psql -h db -U postgres -d postgres <<EOSQL
        -- Schemas
        CREATE SCHEMA IF NOT EXISTS storage;
        CREATE SCHEMA IF NOT EXISTS auth;

        -- Extensions
        CREATE EXTENSION IF NOT EXISTS "uuid-ossp" SCHEMA public;
        CREATE EXTENSION IF NOT EXISTS "pgcrypto"  SCHEMA public;

        -- Roles
        DO \$\$ BEGIN CREATE ROLE supabase_admin LOGIN NOINHERIT CREATEROLE CREATEDB REPLICATION BYPASSRLS; EXCEPTION WHEN DUPLICATE_OBJECT THEN NULL; END \$\$;
        DO \$\$ BEGIN CREATE ROLE anon          NOLOGIN NOINHERIT;                                          EXCEPTION WHEN DUPLICATE_OBJECT THEN NULL; END \$\$;
        DO \$\$ BEGIN CREATE ROLE authenticated  NOLOGIN NOINHERIT;                                          EXCEPTION WHEN DUPLICATE_OBJECT THEN NULL; END \$\$;
        DO \$\$ BEGIN CREATE ROLE service_role   NOLOGIN NOINHERIT BYPASSRLS;                                EXCEPTION WHEN DUPLICATE_OBJECT THEN NULL; END \$\$;

        -- Grants
        GRANT USAGE ON SCHEMA public  TO anon, authenticated, service_role;
        GRANT USAGE ON SCHEMA auth    TO anon, authenticated, service_role;
        GRANT USAGE ON SCHEMA storage TO anon, authenticated, service_role;
        GRANT ALL   ON SCHEMA auth    TO supabase_admin;
        GRANT ALL   ON SCHEMA storage TO supabase_admin;
        GRANT ALL   ON SCHEMA public  TO supabase_admin;

        -- Storage baseline tables
        CREATE TABLE IF NOT EXISTS storage.buckets (
          id text NOT NULL PRIMARY KEY, name text NOT NULL UNIQUE, owner uuid,
          created_at timestamptz DEFAULT now(), updated_at timestamptz DEFAULT now(),
          public boolean DEFAULT false, avif_autodetection boolean DEFAULT false,
          file_size_limit bigint, allowed_mime_types text[]
        );
        CREATE TABLE IF NOT EXISTS storage.objects (
          id uuid NOT NULL DEFAULT uuid_generate_v4() PRIMARY KEY,
          bucket_id text REFERENCES storage.buckets(id), name text, owner uuid,
          created_at timestamptz DEFAULT now(), updated_at timestamptz DEFAULT now(),
          last_accessed_at timestamptz DEFAULT now(), metadata jsonb, version text
        );
        CREATE UNIQUE INDEX IF NOT EXISTS bucketid_objname ON storage.objects (bucket_id, name);

        -- Default privileges for future tables
        ALTER DEFAULT PRIVILEGES IN SCHEMA public  GRANT SELECT ON TABLES TO anon;
        ALTER DEFAULT PRIVILEGES IN SCHEMA public  GRANT ALL    ON TABLES TO authenticated, service_role;
        ALTER DEFAULT PRIVILEGES IN SCHEMA storage GRANT ALL    ON TABLES TO service_role;
      EOSQL
      echo "=== DB-PATCH COMPLETE ==="
      '


  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: supabase_db
    restart: unless-stopped
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    # The Pi 5 relies heavily on port mapping since it's the host.
    # Expose DB to host for DBeaver/Admin tools
    ports:
      - "15432:5432"
    environment:
      <<: *supabase-config
      POSTGRES_USER: postgres
    volumes:
      - supabase_db_data_v6:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 600M

  rest:
    image: postgrest/postgrest:v11.2.0
    container_name: supabase_rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://postgres:root_password@db:5432/postgres
      PGRST_DB_SCHEMA: public, storage, auth
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
      PGRST_DB_USE_LEGACY_GUCS: "false"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 100M

  auth:
    image: supabase/gotrue:v2.105.1
    container_name: supabase_auth
    restart: unless-stopped
    environment:
      <<: *supabase-config
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:root_password@db:5432/postgres
      GOTRUE_SITE_URL: "http://localhost:15300"
      GOTRUE_URI_ALLOW_LIST: "http://localhost:15300"
      GOTRUE_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
      GOTRUE_JWT_EXP: 3600
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 100M

  storage:
    image: supabase/storage-api:v0.43.11
    container_name: supabase_storage
    restart: unless-stopped
    environment:
      <<: *supabase-config
      STORAGE_BACKEND: file
      TENANT_ID: "stub"
      FILE_SIZE_LIMIT: 52428800
      GLOBAL_S3_BUCKET: "stub"
      PGRST_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      DATABASE_URL: postgres://postgres:root_password@db:5432/postgres
      PUBURL: "http://localhost:15432/storage/v1"
      JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
      REGION: local
    volumes:
      - supabase_storage_data_v6:/var/lib/storage
    depends_on:
      rest:
        condition: service_started
      db:
        condition: service_healthy
      db-patch:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 150M

  kong:
    image: kong:2.8.1
    container_name: supabase_kong
    restart: unless-stopped
    ports:
      - "15431:8000" # Mudamos a porta do gateway para 15431 para evitar choque com a do BD
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /tmp/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,jwt
    command:
      - /bin/sh
      - -c
      - |
        cat << 'EOF' > /tmp/kong.yml
        _format_version: "2.1"
        _transform: true
        services:
          - name: rest
            url: http://rest:3000
            routes:
              - name: rest-route
                paths:
                  - /rest/v1
                strip_path: true
          - name: auth
            url: http://auth:9999
            routes:
              - name: auth-route
                paths:
                  - /auth/v1
                strip_path: true
          - name: storage
            url: http://storage:5000
            routes:
              - name: storage-route
                paths:
                  - /storage/v1
                strip_path: true
        EOF
        /docker-entrypoint.sh kong docker-start -c /tmp/kong.yml
    depends_on:
      - rest
      - auth
      - storage
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 100M

  backend:
    build:
      context: ./backend
      no_cache: true
    container_name: stl_prime_backend
    restart: unless-stopped
    ports:
      - "15800:8000"
    environment:
      DATABASE_URL: postgresql://postgres:root_password@db:5432/postgres
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 300M


  frontend:
    build:
      context: ./frontend
      no_cache: true
    container_name: stl_prime_frontend
    restart: unless-stopped
    ports:
      - "15300:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:15800
      - NEXT_PUBLIC_SUPABASE_URL=http://localhost:15431
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNjAwMDAwMDAwLCJleHAiOjI2MDAwMDAwMDB9.2ao3DxAoc3nVdaTeKzjBwxcKqVBVDdqFbSxWEgJln3c
      - SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE2MDAwMDAwMDAsImV4cCI6MjYwMDAwMDAwMH0.NGlfajTL38AtNO2eYSmTqocSyK6BClPz7U---KF4gS4
    depends_on:
      - backend
      - kong
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 300M

volumes:
  supabase_db_data_v6:
  supabase_storage_data_v6:
