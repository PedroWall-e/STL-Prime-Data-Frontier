  PGRST_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
  SITE_URL: "http://localhost:15300"
  API_EXTERNAL_URL: "http://localhost:15432"
  ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNjAwMDAwMDAwLCJleHAiOjI2MDAwMDAwMDB9.2ao3DxAoc3nVdaTeKzjBwxcKqVBVDdqFbSxWEgJln3c"
  SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE2MDAwMDAwMDAsImV4cCI6MjYwMDAwMDAwMH0.NGlfajTL38AtNO2eYSmTqocSyK6BClPz7U---KF4gS4"
  SERVICE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE2MDAwMDAwMDAsImV4cCI6MjYwMDAwMDAwMH0.NGlfajTL38AtNO2eYSmTqocSyK6BClPz7U---KF4gS4"

services:
  db-patch:
    build:
      context: .
      dockerfile: Dockerfile.dbpatch
    container_name: supabase_db_patch
    restart: "no"
    environment:
      PGPASSWORD: "root_password"
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_started
    command:
      - sh
      - -c
      - |
        echo "=== DB-PATCH: Waiting for DB ==="
        until pg_isready -h db -p 5432 -U postgres; do sleep 2; done

        echo "=== DB-PATCH: Creating schemas ==="
        psql -h db -U postgres -d postgres -c "CREATE SCHEMA IF NOT EXISTS storage;"        || true
        psql -h db -U postgres -d postgres -c "CREATE SCHEMA IF NOT EXISTS auth;"           || true
        psql -h db -U postgres -d postgres -c "CREATE SCHEMA IF NOT EXISTS graphql;"        || true
        psql -h db -U postgres -d postgres -c "CREATE SCHEMA IF NOT EXISTS graphql_public;" || true
        psql -h db -U postgres -d postgres -c "CREATE SCHEMA IF NOT EXISTS realtime;"       || true

        echo "=== DB-PATCH: Creating roles (BEFORE extensions) ==="
        psql -h db -U postgres -d postgres -c "CREATE ROLE supabase_admin LOGIN NOINHERIT CREATEROLE CREATEDB REPLICATION BYPASSRLS;" 2>/dev/null || true
        psql -h db -U postgres -d postgres -c "CREATE ROLE anon NOLOGIN NOINHERIT;"                  2>/dev/null || true
        psql -h db -U postgres -d postgres -c "CREATE ROLE authenticated NOLOGIN NOINHERIT;"          2>/dev/null || true
        psql -h db -U postgres -d postgres -c "CREATE ROLE service_role NOLOGIN NOINHERIT BYPASSRLS;" 2>/dev/null || true

        echo "=== DB-PATCH: Installing uuid-ossp in public schema ==="
        psql -h db -U postgres -d postgres -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'  || true
        psql -h db -U postgres -d postgres -c 'CREATE EXTENSION IF NOT EXISTS "pgcrypto";'   || true
        psql -h db -U postgres -d postgres -c 'CREATE EXTENSION IF NOT EXISTS "pgjwt";'      || true

        echo "=== DB-PATCH: Granting schema permissions ==="
        psql -h db -U postgres -d postgres -c "GRANT USAGE ON SCHEMA public TO anon, authenticated, service_role;"   || true
        psql -h db -U postgres -d postgres -c "GRANT USAGE ON SCHEMA auth TO anon, authenticated, service_role;"     || true
        psql -h db -U postgres -d postgres -c "GRANT USAGE ON SCHEMA storage TO anon, authenticated, service_role;"  || true
        psql -h db -U postgres -d postgres -c "GRANT ALL ON SCHEMA auth TO supabase_admin;"     || true
        psql -h db -U postgres -d postgres -c "GRANT ALL ON SCHEMA storage TO supabase_admin;"  || true
        psql -h db -U postgres -d postgres -c "GRANT ALL ON SCHEMA public TO supabase_admin;"   || true

        echo "=== DB-PATCH: Waiting for auth.users (GoTrue migrations) ==="
        for i in $(seq 1 90); do
          if psql -h db -U postgres -d postgres -c "SELECT 1 FROM auth.users LIMIT 1;" >/dev/null 2>&1; then
            echo "auth.users ready after $i attempts!"
            break
          fi
          echo "Waiting for GoTrue... attempt $i/90"
          sleep 2
        done

        echo "=== DB-PATCH: Applying database.sql ==="
        psql -h db -U postgres -d postgres -f /app/database.sql || true

        echo "=== DB-PATCH: Final table grants ==="
        psql -h db -U postgres -d postgres -c "GRANT SELECT ON ALL TABLES IN SCHEMA public TO anon;"               || true
        psql -h db -U postgres -d postgres -c "GRANT ALL ON ALL TABLES IN SCHEMA public TO authenticated, service_role;" || true
        psql -h db -U postgres -d postgres -c "GRANT ALL ON ALL TABLES IN SCHEMA storage TO service_role;"         || true
        psql -h db -U postgres -d postgres -c "GRANT ALL ON ALL TABLES IN SCHEMA auth TO supabase_admin, service_role;" || true

        echo "========================================="
        echo "=== DB-PATCH COMPLETE ==="
        echo "========================================="
        exit 0


  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: supabase_db
    restart: unless-stopped
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    # The Pi 5 relies heavily on port mapping since it's the host.
    # Expose DB to host for DBeaver/Admin tools
    ports:
      - "15432:5432"
    environment:
      <<: *supabase-config
      POSTGRES_USER: postgres
    volumes:
      - supabase_db_data_v7:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 600M

  rest:
    image: postgrest/postgrest:v11.2.0
    container_name: supabase_rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://postgres:root_password@db:5432/postgres
      PGRST_DB_SCHEMA: public, storage, auth
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
      PGRST_DB_USE_LEGACY_GUCS: "false"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 100M

  auth:
    image: supabase/gotrue:v2.105.1
    container_name: supabase_auth
    restart: unless-stopped
    environment:
      <<: *supabase-config
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:root_password@db:5432/postgres
      GOTRUE_SITE_URL: "http://localhost:15300"
      GOTRUE_URI_ALLOW_LIST: "http://localhost:15300"
      GOTRUE_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
      GOTRUE_JWT_EXP: 3600
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 100M

  storage:
    image: supabase/storage-api:v0.43.11
    container_name: supabase_storage
    restart: unless-stopped
    environment:
      <<: *supabase-config
      STORAGE_BACKEND: file
      TENANT_ID: "stub"
      FILE_SIZE_LIMIT: 52428800
      GLOBAL_S3_BUCKET: "stub"
      PGRST_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      DATABASE_URL: postgres://postgres:root_password@db:5432/postgres
      PUBURL: "http://localhost:15432/storage/v1"
      JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
      REGION: local
    volumes:
      - supabase_storage_data_v7:/var/lib/storage
    depends_on:
      rest:
        condition: service_started
      db:
        condition: service_healthy
      db-patch:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 150M

  kong:
    image: kong:2.8.1
    container_name: supabase_kong
    restart: unless-stopped
    ports:
      - "15431:8000" # Mudamos a porta do gateway para 15431 para evitar choque com a do BD
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /tmp/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,jwt
    command:
      - /bin/sh
      - -c
      - |
        cat << 'EOF' > /tmp/kong.yml
        _format_version: "2.1"
        _transform: true
        services:
          - name: rest
            url: http://rest:3000
            routes:
              - name: rest-route
                paths:
                  - /rest/v1
                strip_path: true
          - name: auth
            url: http://auth:9999
            routes:
              - name: auth-route
                paths:
                  - /auth/v1
                strip_path: true
          - name: storage
            url: http://storage:5000
            routes:
              - name: storage-route
                paths:
                  - /storage/v1
                strip_path: true
        EOF
        /docker-entrypoint.sh kong docker-start -c /tmp/kong.yml
    depends_on:
      - rest
      - auth
      - storage
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 100M

  backend:
    build:
      context: ./backend
      no_cache: true
    container_name: stl_prime_backend
    restart: unless-stopped
    ports:
      - "15800:8000"
    environment:
      DATABASE_URL: postgresql://postgres:root_password@db:5432/postgres
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 300M


  frontend:
    build:
      context: ./frontend
      no_cache: true
    container_name: stl_prime_frontend
    restart: unless-stopped
    ports:
      - "15300:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:15800
      - NEXT_PUBLIC_SUPABASE_URL=http://localhost:15431
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNjAwMDAwMDAwLCJleHAiOjI2MDAwMDAwMDB9.2ao3DxAoc3nVdaTeKzjBwxcKqVBVDdqFbSxWEgJln3c
      - SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE2MDAwMDAwMDAsImV4cCI6MjYwMDAwMDAwMH0.NGlfajTL38AtNO2eYSmTqocSyK6BClPz7U---KF4gS4
    depends_on:
      - backend
      - kong
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 300M

volumes:
  supabase_db_data_v7:
  supabase_storage_data_v7:
